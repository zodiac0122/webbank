<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBank - Admin Girişi</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <div class="form-container">
        <div class="form-card" style="animation: fadeInUp 0.6s ease">
            <div class="text-center mb-3">
                <span style="font-size: 3rem;">🛡️</span>
            </div>
            <h2 data-i18n="admin.login_title">Admin Girişi</h2>
            <p class="form-subtitle">WebBank İdarəetmə Paneli</p>

            <div class="error-message" id="error-msg"></div>

            <form id="admin-login-form">
                <div class="form-group">
                    <label data-i18n="auth.email">Email</label>
                    <input type="email" class="form-control" id="email" required placeholder="admin@webbank.az">
                </div>
                <div class="form-group">
                    <label data-i18n="auth.password">Şifrə</label>
                    <input type="password" class="form-control" id="password" required placeholder="••••••••">
                </div>
                <button type="submit" class="btn btn-primary btn-block btn-lg" id="login-btn">
                    Admin Giriş
                </button>
            </form>

            <p class="form-text">
                <a href="/">← Ana səhifəyə qayıt</a>
            </p>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        // Artıq admin giriş edibsə panel-ə yönləndir
        document.addEventListener('DOMContentLoaded', async () => {
            try {
                const res = await fetch('/api/admin/check');
                const data = await res.json();
                if (data.authenticated) {
                    window.location.href = '/idaretmepanel/panel';
                }
            } catch (e) {}
        });

        document.getElementById('admin-login-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('login-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            App.showLoading(btn);

            try {
                const data = await App.apiRequest('/api/admin/login', {
                    method: 'POST',
                    body: JSON.stringify({
                        email: document.getElementById('email').value,
                        password: document.getElementById('password').value
                    })
                });

                if (data.success) {
                    window.location.href = '/idaretmepanel/panel';
                }
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                App.hideLoading(btn);
            }
        });
    </script>
</body>
</html>
