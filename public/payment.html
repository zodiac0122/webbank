<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBank - Ödəniş</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><span class="logo-icon">🏦</span><span>WebBank</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/" data-i18n="nav.home">Ana Səhifə</a></li>
                <li><a href="/packages" data-i18n="nav.packages">Paketlər</a></li>
                <li><a href="/dashboard" data-i18n="nav.dashboard">İdarə paneli</a></li>
                <li><a href="#" class="logout-btn" data-i18n="nav.logout">Çıxış</a></li>
                <li id="lang-container"></li>
            </ul>
            <div class="menu-toggle" id="menu-toggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="form-container" style="max-width: 580px;">
        <div class="form-card" style="animation: fadeInUp 0.6s ease">
            <h2 data-i18n="payment_page.title">Ödəniş Et</h2>
            <p class="form-subtitle" data-i18n="payment_page.subtitle">Aşağıda göstərilən karta ödəniş edin və qəbzi yükləyin</p>

            <!-- Seçilmiş paket məlumatı -->
            <div class="alert alert-info" id="package-info" style="display:none">
                <span id="package-info-text"></span>
            </div>

            <!-- Ödəniş kartı göstərilir -->
            <div class="payment-card-display">
                <div class="payment-card-label" data-i18n="payment_page.card_info">Ödəniş kartı</div>
                <div class="payment-card-number">1234 1234 1234 1234</div>
                <div class="payment-card-label">WebBank Investment</div>
            </div>

            <div class="error-message" id="error-msg"></div>

            <form id="payment-form" enctype="multipart/form-data">
                <input type="hidden" id="package_id" name="package_id">

                <div class="form-group">
                    <label data-i18n="payment_page.full_name">Ad Soyad</label>
                    <input type="text" class="form-control" id="full_name" name="full_name" required placeholder="Ad Soyad">
                </div>
                <div class="form-group">
                    <label data-i18n="payment_page.email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label data-i18n="payment_page.phone">Telefon nömrəsi</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required placeholder="+994XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label data-i18n="payment_page.upload_receipt">Qəbzi yükləyin</label>
                    <input type="file" class="form-control" id="receipt" name="receipt" required accept="image/*,.pdf">
                </div>

                <div class="alert alert-warning">
                    <span data-i18n="payment_page.note">Qeyd: Ödəniş admin tərəfindən təsdiqlədikdən sonra paketiniz aktivləşəcək.</span>
                </div>

                <button type="submit" class="btn btn-primary btn-block btn-lg" id="submit-btn" data-i18n="payment_page.submit">
                    Ödənişi Göndər
                </button>
            </form>

            <p class="form-text">
                <a href="/packages">← Paketlərə qayıt</a>
            </p>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        const packageNames = {
            basic: { az: 'Əsas Paket', ru: 'Базовый', en: 'Basic' },
            standard: { az: 'Standart Paket', ru: 'Стандарт', en: 'Standard' },
            premium: { az: 'Premium Paket', ru: 'Премиум', en: 'Premium' }
        };

        document.addEventListener('DOMContentLoaded', async () => {
            const langContainer = document.getElementById('lang-container');
            if (langContainer) langContainer.innerHTML = I18n.createSelector();

            if (!App.user) {
                window.location.href = '/login';
                return;
            }

            // URL-dən paket ID al
            const urlParams = new URLSearchParams(window.location.search);
            const packageId = urlParams.get('package');
            if (packageId) {
                document.getElementById('package_id').value = packageId;
                loadPackageInfo(packageId);
            }

            // İstifadəçi məlumatlarını doldur
            if (App.user.full_name) document.getElementById('full_name').value = App.user.full_name;
            if (App.user.email) document.getElementById('email').value = App.user.email;
        });

        async function loadPackageInfo(id) {
            try {
                const res = await fetch('/api/packages/' + id);
                const data = await res.json();
                const lang = I18n.currentLang || 'az';
                const name = packageNames[data.package.name_key]?.[lang] || data.package.name_key;

                const infoDiv = document.getElementById('package-info');
                document.getElementById('package-info-text').textContent = `${name} - ${data.package.price} AZN → ${data.package.total_return} AZN`;
                infoDiv.style.display = '';
            } catch (error) {
                console.error('Paket yükləmə xətası:', error);
            }
        }

        document.getElementById('payment-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            const packageId = document.getElementById('package_id').value;
            if (!packageId) {
                errorMsg.textContent = 'Zəhmət olmasa əvvəlcə paket seçin';
                errorMsg.style.display = 'block';
                return;
            }

            App.showLoading(btn);

            try {
                const formData = new FormData();
                formData.append('package_id', packageId);
                formData.append('full_name', document.getElementById('full_name').value);
                formData.append('email', document.getElementById('email').value);
                formData.append('phone', document.getElementById('phone').value);
                formData.append('receipt', document.getElementById('receipt').files[0]);

                const data = await App.apiRequest('/api/payments', {
                    method: 'POST',
                    body: formData
                });

                App.showNotification(data.message, 'success');
                setTimeout(() => window.location.href = '/dashboard', 2000);
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                App.hideLoading(btn);
            }
        });
    </script>
</body>
</html>
