<!DOCTYPE html>
<html lang="az">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WebBank - Çıxarış</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-container">
            <a href="/" class="nav-logo"><span class="logo-icon">🏦</span><span>WebBank</span></a>
            <ul class="nav-links" id="nav-links">
                <li><a href="/" data-i18n="nav.home">Ana Səhifə</a></li>
                <li><a href="/packages" data-i18n="nav.packages">Paketlər</a></li>
                <li><a href="/dashboard" data-i18n="nav.dashboard">İdarə paneli</a></li>
                <li><a href="/withdrawal" class="active" data-i18n="nav.withdrawal">Çıxarış</a></li>
                <li><a href="#" class="logout-btn" data-i18n="nav.logout">Çıxış</a></li>
                <li id="lang-container"></li>
            </ul>
            <div class="menu-toggle" id="menu-toggle"><span></span><span></span><span></span></div>
        </div>
    </nav>

    <div class="form-container" style="max-width: 520px;">
        <div class="form-card" style="animation: fadeInUp 0.6s ease">
            <h2 data-i18n="withdrawal_page.title">Çıxarış</h2>
            <p class="form-subtitle" data-i18n="withdrawal_page.subtitle">Balansınızdan pul çıxarın</p>

            <div class="alert alert-warning" data-i18n="withdrawal_page.monday_only">
                ⚠️ Çıxarış yalnız Bazar ertəsi günləri mümkündür
            </div>

            <div class="alert alert-info">
                <div class="d-flex justify-between items-center" style="width:100%">
                    <span data-i18n="withdrawal_page.your_balance">Balansınız</span>
                    <span class="fw-bold text-green" id="current-balance">0.00 AZN</span>
                </div>
            </div>

            <div class="error-message" id="error-msg"></div>

            <form id="withdrawal-form">
                <div class="form-group">
                    <label data-i18n="withdrawal_page.amount">Məbləğ (minimum 25 AZN)</label>
                    <input type="number" class="form-control" id="amount" name="amount" required min="25" step="0.01" placeholder="25.00">
                </div>
                <div class="form-group">
                    <label data-i18n="withdrawal_page.email">Email</label>
                    <input type="email" class="form-control" id="email" name="email" required placeholder="email@example.com">
                </div>
                <div class="form-group">
                    <label data-i18n="withdrawal_page.phone">Telefon (+994 formatında)</label>
                    <input type="tel" class="form-control" id="phone" name="phone" required placeholder="+994XXXXXXXXX">
                </div>
                <div class="form-group">
                    <label data-i18n="withdrawal_page.card_number">Kart nömrəsi</label>
                    <input type="text" class="form-control" id="card_number" name="card_number" required placeholder="XXXX XXXX XXXX XXXX">
                </div>

                <button type="submit" class="btn btn-success btn-block btn-lg" id="submit-btn" data-i18n="withdrawal_page.submit">
                    Çıxarış Sorğusu Göndər
                </button>
            </form>

            <p class="form-text">
                <a href="/dashboard">← Dashboard-a qayıt</a>
            </p>
        </div>
    </div>

    <script src="/js/i18n.js"></script>
    <script src="/js/app.js"></script>
    <script>
        document.addEventListener('DOMContentLoaded', async () => {
            const langContainer = document.getElementById('lang-container');
            if (langContainer) langContainer.innerHTML = I18n.createSelector();

            if (!App.user) {
                window.location.href = '/login';
                return;
            }

            document.getElementById('current-balance').textContent = parseFloat(App.user.balance).toFixed(2) + ' AZN';
            if (App.user.email) document.getElementById('email').value = App.user.email;
        });

        document.getElementById('withdrawal-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const btn = document.getElementById('submit-btn');
            const errorMsg = document.getElementById('error-msg');
            errorMsg.style.display = 'none';

            App.showLoading(btn);

            try {
                const data = await App.apiRequest('/api/withdrawals', {
                    method: 'POST',
                    body: JSON.stringify({
                        amount: parseFloat(document.getElementById('amount').value),
                        email: document.getElementById('email').value,
                        phone: document.getElementById('phone').value,
                        card_number: document.getElementById('card_number').value
                    })
                });

                App.showNotification(data.message, 'success');
                setTimeout(() => window.location.href = '/dashboard', 2000);
            } catch (error) {
                errorMsg.textContent = error.message;
                errorMsg.style.display = 'block';
            } finally {
                App.hideLoading(btn);
            }
        });
    </script>
</body>
</html>
